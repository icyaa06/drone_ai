<!doctype html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Панель организатора · Drone AI</title><link rel="stylesheet" href="/style.css"></head><body class="admin-body"><section id="loginView" class="login-screen"><form id="loginForm" class="login-card"><a class="brand" href="/"><img class="brand-logo" src="/drone_educate_logo.png" alt="DronED"></a><h1>Панель организатора</h1><p class="form-sub">Доступ к заявкам и документам участников.</p><div id="loginNotice" class="notice"></div><div class="field"><label for="password">Пароль</label><input id="password" name="password" type="password" required autofocus></div><button class="btn btn-dark btn-block">Войти →</button></form></section><section id="dashboardView" class="admin-shell" hidden><aside class="sidebar"><a class="brand" href="/"><img class="brand-logo" src="/drone_educate_logo.png" alt="DronED"></a><nav class="side-nav"><a class="active" href="#">Обзор заявок</a></nav><button id="logoutButton" class="btn btn-ghost btn-block" style="position:absolute;bottom:28px;left:22px;width:206px">Выйти</button></aside><main class="admin-main"><header class="admin-head"><div><span class="kicker">Organizer workspace</span><h1>Заявки команд</h1></div><button id="refreshButton" class="btn btn-light">↻ Обновить</button></header><div class="grid stat-grid"><article class="stat-card"><span>Всего заявок</span><strong id="statTotal">0</strong></article><article class="stat-card"><span>Сегодня</span><strong id="statToday">0</strong></article><article class="stat-card"><span>На проверке</span><strong id="statReview">0</strong></article><article class="stat-card"><span>Финалисты</span><strong id="statFinalists">0</strong></article></div><section class="table-card"><div class="table-tools"><input id="searchInput" placeholder="Поиск по команде, проекту, ID или email"><select id="statusFilter"><option value="">Все статусы</option><option value="submitted">Заявка подана</option><option value="screening">Технический скрининг</option><option value="stage2">Stage 2</option><option value="regional_review">Отбор городского центра</option><option value="finalist">Финалист</option><option value="declined">Не прошла</option></select></div><div style="overflow:auto"><table class="data-table"><thead><tr><th>ID</th><th>Команда / проект</th><th>Городской центр</th><th>Направление</th><th>Участники</th><th>Статус</th><th></th></tr></thead><tbody id="applicationRows"></tbody></table></div><div id="tableEmpty" class="empty" hidden>Заявки не найдены</div></section></main></section><div id="detailModal" class="modal"><div class="modal-panel"><header class="modal-head"><div><span id="detailCode" class="kicker"></span><h2 id="detailTitle">Заявка</h2></div><button id="closeModal" aria-label="Закрыть">×</button></header><div id="detailContent"></div></div></div><script src="/common.js"></script><script src="/admin.js"></script></body></html>
